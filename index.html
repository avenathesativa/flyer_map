        .popup-loc { margin-top: 2px; }

        const colorMap = {
            'Castro': '#f39c12',
            'Noe Valley': '#3498db',

            'Valencia': '#e67e22',
            'Market St': '#e74c3c',
            'Bulletin Board': '#9b59b6',
        };

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB',
            maxZoom: 19,
        }).addTo(map);

        pins.forEach(pin => {
            const color = colorMap[pin.area] || '#333';
            const marker = L.circleMarker([pin.lat, pin.lng], {
                radius: 6,
                fillColor: color,
                color: '#333',
                weight: 1,
                fillOpacity: 0.85,
            }).addTo(map);

            marker.bindPopup(
                '<div class="popup-num">#' + String(pin.num).padStart(3, '0') + '</div>' +
                '<div class="popup-area">' + pin.area + '</div>' +
                '<div class="popup-loc">' + pin.location + '</div>'
            );
        });

        if (pins.length > 0) {
            const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
            map.fitBounds(bounds, { padding: [30, 30] });
        }

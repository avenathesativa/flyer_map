  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #faf8f5;
    color: #2a2520;
  }

  .header {
    background: #2a2520;
    color: #faf8f5;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    letter-spacing: -0.5px;
  }

  .header p {
    font-size: 13px;
    opacity: 0.7;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .filter-btn.active { transform: scale(1.05); }
  .filter-btn:not(.active) { opacity: 0.4; filter: grayscale(0.5); }

  .filter-btn[data-area="all"] { background: #2a2520; color: #faf8f5; border: 2px solid #faf8f5; }
  .filter-btn[data-area="Castro"] { background: #E74C3C; color: #fff; }
  .filter-btn[data-area="Noe Valley"] { background: #3498DB; color: #fff; }
  .filter-btn[data-area="Hayes Valley"] { background: #27AE60; color: #fff; }
  .filter-btn[data-area="Valencia"] { background: #F39C12; color: #fff; }
  .filter-btn[data-area="Market St"] { background: #9B59B6; color: #fff; }

  #map {
    width: 100%;
    height: calc(100vh - 72px);
  }

  .leaflet-div-icon {
    background: none !important;
    border: none !important;
  }

  .flyer-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    text-align: center;
    cursor: pointer;
  }

  .flyer-marker.castro { background: #E74C3C; }
  .flyer-marker.noe-valley { background: #3498DB; }
  .flyer-marker.hayes-valley { background: #27AE60; }
  .flyer-marker.valencia { background: #F39C12; }
  .flyer-marker.market-st { background: #9B59B6; }

  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
  }

  .leaflet-popup-content {
    margin: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .popup-flyer {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .popup-area {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .legend {
    background: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    font-size: 12px;
    line-height: 2;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  @media print {
    .header { padding: 10px 20px; }
    .controls { display: none; }
    #map { height: calc(100vh - 52px); }
    .legend { display: block !important; }
  }
</style>
</head>

  const num = parseInt(f.n);

  const icon = L.divIcon({
    className: 'leaflet-div-icon',
    html: `<div class="flyer-marker ${cssClass}">${num}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -16]
  });

  const marker = L.marker([f.lat, f.lng], { icon })
    .bindPopup(`
      <div class="popup-flyer">Flyer #${f.n}</div>
      <div class="popup-area" style="background:${color}">${f.area}</div>
      <div>${f.loc}</div>
    `);

  marker._area = f.area;
  allMarkers.push(marker);

  if (!markersByArea[f.area]) markersByArea[f.area] = [];
  markersByArea[f.area].push(marker);

  marker.addTo(map);
});

// Legend
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<div style="font-weight:700;margin-bottom:4px;">Neighborhoods</div>' +
    Object.entries(COLORS).map(([area, color]) =>
      `<div class="legend-row"><div class="legend-dot" style="background:${color}"></div>${area}</div>`
    ).join('');
  return div;
};
legend.addTo(map);

// Filter logic
let activeAreas = new Set(Object.keys(COLORS));

function filterArea(area) {
  if (area === 'all') {
    const allActive = activeAreas.size === Object.keys(COLORS).length;
    if (allActive) {
      activeAreas.clear();
    } else {
      activeAreas = new Set(Object.keys(COLORS));
    }
  } else {
    if (activeAreas.has(area)) {
      activeAreas.delete(area);
    } else {
      activeAreas.add(area);
    }
  }

  // Update markers
  allMarkers.forEach(m => {
    if (activeAreas.has(m._area)) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });

  // Update buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const btnArea = btn.dataset.area;
    if (btnArea === 'all') {
      btn.classList.toggle('active', activeAreas.size === Object.keys(COLORS).length);
    } else {
      btn.classList.toggle('active', activeAreas.has(btnArea));
    }
  });
}
</script>
</body>
